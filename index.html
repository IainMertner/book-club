<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Club</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <span class="logo">📚</span>
    <h1>Book Club</h1>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="meeting">Meeting</button>
    <button class="tab" data-tab="spin">Spin</button>
    <button class="tab" data-tab="books">Books</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="members">Members</button>
  </nav>

  <main>
    <div id="tab-meeting" class="tab-panel active"></div>
    <div id="tab-spin" class="tab-panel"></div>
    <div id="tab-books" class="tab-panel"></div>
    <div id="tab-history" class="tab-panel"></div>
    <div id="tab-members" class="tab-panel"></div>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
